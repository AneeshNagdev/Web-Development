<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Form</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto&family=Merriweather&display=swap" rel="stylesheet">

    <style>
        body {
            font-family: Arial;
            margin: 40px;
        }
        
        label {
            display: block;
            margin-top: 10px;
        }

        #inp {
            width: 300px;
            padding: 5px;
        }

        .buttons input {
            margin-top: 15px;
            margin-right: 10px;
            padding: 7px 10px;
        }

    </style>
</head>
<body>
    <h2>City Info</h2>

    <form method="POST">
        <label>City:</label>
        <input type="text" id="inp" name="city" required>
        
        <label>Country:</label>
        <input type="text" id="inp" name="country" required>
        
        <label>URL of picture of city:</label>
        <input type="url" id="inp" name="image" required>
        
        <label>Choose a color:</label>
        <input type="color" name="color">

        <div class="buttons">
            <input type="submit" value="Send to ASP" formaction="http://aneeshnagdev.somee.com/default.asp">
            
            <input type="submit" value="Send to CGI" formaction="https://www2.cs.torontomu.ca/~anagdev/cgi-bin/lab10b.cgi">
            
            <input type="submit" value="Send to Python" formaction="https://www2.cs.torontomu.ca/~anagdev/cgi-bin/lab10c.cgi">

        </div>
    </form>
</body>
</html>
